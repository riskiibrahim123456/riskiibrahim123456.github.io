<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itachi Uchiha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a0000 0%, #0d0000 60%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            position: relative;
        }

        #intro-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 999;
            background: #000;
            transition: opacity 0.8s ease;
        }

        #intro-video.hide {
            opacity: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            max-width: 700px;
            opacity: 0;
            animation: fadeIn 1.5s ease 0.5s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .container h1 {
            font-size: 55px;
            font-weight: 900;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 60px rgba(200, 0, 0, 0.5);
            letter-spacing: 6px;
            animation: glitch 3s infinite;
        }

        .container h2 {
            font-size: 22px;
            font-weight: 300;
            color: #aaa;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            margin-bottom: 15px;
            letter-spacing: 8px;
        }

        .container p {
            font-size: 17px;
            color: #ccc;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.7);
            padding: 18px 25px;
            border-radius: 15px;
            border-left: 4px solid #cc0000;
            backdrop-filter: blur(5px);
        }

        @keyframes glitch {
            0%, 90%, 100% { opacity: 1; transform: scale(1); }
            92% { opacity: 0.8; transform: scale(1.02) skewX(-2deg); }
            94% { opacity: 1; transform: scale(0.98) skewX(2deg); }
            96% { opacity: 0.9; transform: scale(1.01) skewX(-1deg); }
        }

        .sharingan {
            position: fixed;
            font-size: 120px;
            opacity: 0.05;
            color: #ff0000;
            z-index: 1;
            pointer-events: none;
            animation: spin 20s linear infinite;
        }

        .sharingan.top-left {
            top: -30px;
            left: -30px;
            font-size: 200px;
        }

        .sharingan.bottom-right {
            bottom: -30px;
            right: -30px;
            font-size: 200px;
            animation-delay: -10s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @media (max-width: 600px) {
            .container h1 { font-size: 36px; }
            .container h2 { font-size: 16px; letter-spacing: 4px; }
            .container p { font-size: 14px; padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- VIDEO DENGAN MUTED (DIJAMIN JALAN) -->
    <video id="intro-video" autoplay muted playsinline>
        <source src="https://raw.githubusercontent.com/riskiibrahim123456/riskiibrahim123456.github.io/main/a8e5890b38990fad919aa40ab7bc5717.mp4" type="video/mp4">
    </video>

    <div class="sharingan top-left">🌀</div>
    <div class="sharingan bottom-right">🌀</div>

    <div class="container">
        <h1>ITACHI</h1>
        <h2>UCHIHA</h2>
        <p>
            "Orang-orang hidup tidak semua sama. Untuk melindungi seseorang, 
            terkadang kau harus mengorbankan yang lain."<br>
            <span style="color:#cc0000; font-style:italic;">— Itachi Uchiha</span>
        </p>
    </div>

    <script>
        const video = document.getElementById('intro-video');

        video.addEventListener('ended', function() {
            video.classList.add('hide');
        });

        setTimeout(function() {
            if (!video.classList.contains('hide')) {
                video.classList.add('hide');
            }
        }, 11000);
    </script>

</body>
</html>
