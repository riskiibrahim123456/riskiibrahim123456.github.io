<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itachi Uchiha - Tribute</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a0000 0%, #0d0000 50%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Efek latar merah gelap berdenyut */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.15), transparent 70%);
            animation: pulse 4s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Container utama */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            padding: 40px;
            max-width: 800px;
        }

        .container h1 {
            font-size: 70px;
            font-weight: 900;
            text-transform: uppercase;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 60px rgba(200, 0, 0, 0.5), 0 0 100px rgba(255, 0, 0, 0.3);
            letter-spacing: 6px;
            animation: glitch 3s infinite;
            margin-bottom: 10px;
        }

        .container h2 {
            font-size: 28px;
            font-weight: 300;
            color: #aaa;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            margin-bottom: 20px;
            letter-spacing: 8px;
        }

        .container p {
            font-size: 18px;
            color: #ccc;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 30px;
            border-radius: 15px;
            border-left: 4px solid #cc0000;
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        /* Tombol */
        .btn {
            display: inline-block;
            padding: 15px 45px;
            background: transparent;
            color: #cc0000;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #cc0000;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.4s;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .btn:hover {
            background: #cc0000;
            color: #000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8);
            transform: scale(1.05);
        }

        /* Gagak hitam animasi */
        .crow {
            position: fixed;
            font-size: 40px;
            color: #111;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            z-index: 1;
            animation: fly linear infinite;
            pointer-events: none;
            user-select: none;
        }

        @keyframes fly {
            0% {
                transform: translate(-200px, 0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translate(110vw, -300px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Animasi glitch teks */
        @keyframes glitch {
            0%, 90%, 100% { opacity: 1; transform: scale(1); }
            92% { opacity: 0.8; transform: scale(1.02) skewX(-2deg); }
            94% { opacity: 1; transform: scale(0.98) skewX(2deg); }
            96% { opacity: 0.9; transform: scale(1.01) skewX(-1deg); }
        }

        /* Efek Sharingan di sudut */
        .sharingan {
            position: fixed;
            font-size: 120px;
            opacity: 0.05;
            color: #ff0000;
            z-index: 0;
            pointer-events: none;
            animation: rotate 20s linear infinite;
        }

        .sharingan.top-left {
            top: -30px;
            left: -30px;
            font-size: 200px;
        }

        .sharingan.bottom-right {
            bottom: -30px;
            right: -30px;
            font-size: 200px;
            animation-delay: -10s;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Responsif */
        @media (max-width: 600px) {
            .container h1 {
                font-size: 40px;
            }
            .container h2 {
                font-size: 18px;
                letter-spacing: 4px;
            }
            .container p {
                font-size: 14px;
                padding: 15px;
            }
            .btn {
                font-size: 16px;
                padding: 12px 30px;
            }
            .crow {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Itachi (menggunakan teks/simbol) -->
    <div class="sharingan top-left">🌀</div>
    <div class="sharingan bottom-right">🌀</div>

    <!-- Gagak hitam (animasi) -->
    <div class="crow" style="animation-duration: 12s; animation-delay: 0s; top: 5%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 15s; animation-delay: 3s; top: 20%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 10s; animation-delay: 6s; top: 50%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 18s; animation-delay: 2s; top: 70%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 14s; animation-delay: 9s; top: 85%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 20s; animation-delay: 5s; top: 35%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 11s; animation-delay: 12s; top: 60%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 16s; animation-delay: 8s; top: 10%; left: -10%;">🐦‍⬛</div>
    <div class="crow" style="animation-duration: 13s; animation-delay: 15s; top: 45%; left: -10%;">🐦‍⬛</div>

    <!-- Isi Konten -->
    <div class="container">
        <h1>ITACHI</h1>
        <h2>UCHIHA</h2>
        <p>
            "Orang-orang hidup tidak semua sama. Untuk melindungi sesorang, 
            terkadang kau harus mengorbankan yang lain."<br>
            <span style="color:#cc0000; font-style:italic;">— Itachi Uchiha</span>
        </p>
        <button class="btn" onclick="alert('🖤 Kamu adalah keturunan Uchiha yang kuat!')">🖤 Sharingan</button>
    </div>

</body>
</html>
