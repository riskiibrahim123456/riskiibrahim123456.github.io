<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itachi Uchiha</title>
    <style>
        /* Reset dan background merah-hitam */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a0000 0%, #0d0000 60%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Efek cahaya merah berdenyut (seperti chakra) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.15), transparent 70%);
            animation: pulse 4s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Container utama */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            max-width: 700px;
        }

        /* Gambar Itachi */
        .itachi-image {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.6), 0 0 100px rgba(200, 0, 0, 0.3);
            border: 3px solid #cc0000;
            margin-bottom: 20px;
            transition: 0.5s;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .itachi-image:hover {
            transform: scale(1.03);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.9);
        }

        /* Teks judul */
        .container h1 {
            font-size: 55px;
            font-weight: 900;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 60px rgba(200, 0, 0, 0.5);
            letter-spacing: 6px;
            animation: glitch 3s infinite;
            margin-bottom: 5px;
        }

        .container h2 {
            font-size: 22px;
            font-weight: 300;
            color: #aaa;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            margin-bottom: 15px;
            letter-spacing: 8px;
        }

        /* Kutipan */
        .container p {
            font-size: 17px;
            color: #ccc;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.7);
            padding: 18px 25px;
            border-radius: 15px;
            border-left: 4px solid #cc0000;
            backdrop-filter: blur(5px);
            margin-bottom: 25px;
        }

        /* Tombol Sharingan */
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: transparent;
            color: #cc0000;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #cc0000;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .btn:hover {
            background: #cc0000;
            color: #000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8);
            transform: scale(1.05);
        }

        /* Efek glitch pada teks */
        @keyframes glitch {
            0%, 90%, 100% { opacity: 1; transform: scale(1); }
            92% { opacity: 0.8; transform: scale(1.02) skewX(-2deg); }
            94% { opacity: 1; transform: scale(0.98) skewX(2deg); }
            96% { opacity: 0.9; transform: scale(1.01) skewX(-1deg); }
        }

        /* Simbol Sharingan di sudut */
        .sharingan {
            position: fixed;
            font-size: 120px;
            opacity: 0.05;
            color: #ff0000;
            z-index: 0;
            pointer-events: none;
            animation: spin 20s linear infinite;
        }

        .sharingan.top-left {
            top: -30px;
            left: -30px;
            font-size: 200px;
        }

        .sharingan.bottom-right {
            bottom: -30px;
            right: -30px;
            font-size: 200px;
            animation-delay: -10s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .container h1 { font-size: 36px; }
            .container h2 { font-size: 16px; letter-spacing: 4px; }
            .container p { font-size: 14px; padding: 15px; }
            .btn { font-size: 14px; padding: 10px 25px; }
            .itachi-image { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Hiasan Sharingan di sudut -->
    <div class="sharingan top-left">🌀</div>
    <div class="sharingan bottom-right">🌀</div>

    <div class="container">
        <!-- GANTI LINK GAMBAR DI BAWAH INI -->
        <img class="itachi-image" 
             src="https://raw.githubusercontent.com/riskiibrahim123456/riskiibrahim123456.github.io/main/nama_gambar_anda.jpg" 
             alt="Itachi Uchiha">
        
        <h1>ITACHI</h1>
        <h2>UCHIHA</h2>
        <p>
            "Orang-orang hidup tidak semua sama. Untuk melindungi seseorang, 
            terkadang kau harus mengorbankan yang lain."<br>
            <span style="color:#cc0000; font-style:italic;">— Itachi Uchiha</span>
        </p>
        <button class="btn" onclick="alert('🖤 Kamu adalah keturunan Uchiha yang kuat!')">🖤 Sharingan</button>
    </div>

</body>
</html>
